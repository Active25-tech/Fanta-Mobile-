name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Ensure TypeScript is available
        run: npm install -D typescript

      - name: Ensure web assets folder exists
        run: |
          mkdir -p www
          if [ -f index.html ]; then
            cp index.html www/index.html
          elif [ -f www/index.html ]; then
            echo "www/index.html already exists"
          else
            echo "No index.html found in repo root or www/"
            exit 1
          fi

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fanta-anaar-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
